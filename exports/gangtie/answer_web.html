<body>

    <script>
        const data = {

            fillInBlanks: ["奥斯特洛夫斯基", "保尔·柯察金", "朱赫来", "冬妮亚", "德国中尉", "谢廖沙", "丽达", "筑路", "伤寒", "双目失明", "《暴风雨所诞生的》", "达雅", "阿尔焦姆", "烈士公墓", "朱赫来", "维克托", "茨维塔耶夫", "法伊洛", "铁路", "木材", "保尔", "朱赫来", "丽达", "达雅", "瓦莉亚", "赫里斯季娜", "列宁", "保尔", "朱赫来", "保尔", "修筑铁路/筑路", "保尔", "伤病严重/失明", "文学创作", "共产党员", "保尔", "共产主义/革命", "钢铁", "朱赫来", "作者本人", "资产阶级", "艰苦斗争/烈火", "丽达", "保尔", "阿尔焦姆", "筑路/修建铁路", "革命气概/牺牲精神", "钢铁意志", "尼古拉·奥斯特洛夫斯基", "保尔精神"],
            shortAnswerDetailed: [
                { q: "1. 简述《钢铁是怎样炼成的》的主要故事情节。", a: "答：小说讲述保尔·柯察金从顽皮少年成长为钢铁战士的一生。他参加革命、修建铁路、与病魔斗争，最终全身瘫痪、双目失明后仍坚持文学创作，用笔作为新的武器继续战斗。" },
                { q: "2. 保尔·柯察金在发电厂认识了谁？这个人对他产生了怎样的影响？", a: "答：认识了朱赫来。朱赫来是地下党员，教会保尔拳击和革命道理，引导他走上革命道路，是保尔人生中最重要的导师。" },
                { q: "3. 分析保尔·柯察金这一人物形象及其性格特点。", a: "答：保尔勇敢顽强、意志坚定、忠诚于革命事业。他敢于反抗压迫，不怕牺牲，身残志坚，具有钢铁般的意志和无私奉献的精神。" },
                { q: "4. 冬妮亚是一个怎样的人物形象？她与保尔的感情为何破裂？", a: "答：冬妮亚是林务官的女儿，善良但有小资产阶级情调。与保尔因阶级观念不同而分手——她穿着考究参加共青团会议，被保尔认为脱离群众。" },
                { q: "5. 朱赫来在保尔的成长过程中起到了什么作用？", a: "答：朱赫来是保尔的革命引路人。他教保尔拳击、讲述革命道理、在关键时刻保护保尔，塑造了保尔坚定的革命信念。" },
                { q: "6. 丽达与保尔之间是怎样的关系？她代表什么样的女性形象？", a: "答：丽达是保尔的革命战友和恋人，代表独立、坚强、有觉悟的革命女性形象。因保尔误以为她已结婚而分手。" },
                { q: "7. 保尔在修建铁路时遇到了哪些困难？这段经历表现了他怎样的精神？", a: "答：困难：严寒、缺衣少食、土匪骚扰、疾病威胁。表现了他不畏艰难、顽强拼搏、为革命献身的钢铁精神。" },
                { q: "8. 保尔是如何失明的？失明后他选择了怎样的人生道路？", a: "答：战争创伤加上筑路时患伤寒，后又因车祸伤及右眼，最终双目失明。失明后他选择文学创作，写出《暴风雨里诞生的》。" },
                { q: "9. 小说标题“钢铁是怎样炼成的”有什么象征意义？", a: "答：象征革命者在艰难困苦中锻炼成钢铁般的意志。保尔如同钢铁，在烈火与锤炼中变得坚强不屈。" },
                { q: "10. 保尔在烈士公墓前的一段独白表达了怎样的思想感情？", a: "答：表达了对牺牲战友的缅怀、对生命价值的思考，以及“人最宝贵的是生命，要为人类解放而斗争”的人生观。" },
                { q: "11. 谢廖沙这个人物在小说中的作用是什么？他的牺牲有何意义？", a: "答：谢廖沙是保尔的童年好友，勇敢参加革命，最终牺牲。他的牺牲表现了革命战争的残酷和革命者的英勇。" },
                { q: "12. 保尔与茨维塔耶夫、屠弗塔等人的矛盾反映了什么问题？", a: "答：反映了保尔坚持原则、反对官僚主义和形式主义的立场。他敢于与不良作风作斗争，维护革命利益。" },
                { q: "13. 保尔的哥哥阿尔焦姆是怎样的一个人？他对保尔有何影响？", a: "答：阿尔焦姆是普通的铁路工人，朴实善良、爱护弟弟。他教会保尔正直做人，是保尔早期的榜样。" },
                { q: "14. 小说中多次描写保尔的身体状况恶化，这样写有何作用？", a: "答：衬托保尔钢铁般的意志——身体越衰弱，精神越强大。同时也增强悲剧感 and 感染力。" },
                { q: "15. 保尔与法伊洛的冲突体现了保尔什么样的原则立场？", a: "答：法伊洛生活腐化，保尔在大会上公开批评他。体现了保尔坚持原则、维护革命纪律的立场。" },
                { q: "16. 《钢铁是怎样炼成的》的艺术特色是什么？", a: "答：自传体与小说结合、情节紧凑、人物形象鲜明、语言充满激情，具有强烈的感染力和教育意义。" },
                { q: "17. 小说中保尔与“公社战士”们的关系如何？体现了怎样的集体主义精神？", a: "答：保尔与战友们团结互助、并肩战斗，体现了革命者以集体利益为重、无私奉献的集体主义精神。" },
                { q: "18. 保尔最终选择文学创作作为新的战斗武器，这一转变有何意义？", a: "答：体现了他“生命不息、战斗不止”的精神。即使身体残疾，仍用笔继续为革命事业贡献力量。" },
                { q: "19. 如何理解《钢铁是怎样炼成的》的革命英雄主义精神？", a: "答：表现为不怕牺牲、勇于奉献、将个人命运融入革命事业。保尔是这种精神的典型代表。" },
                { q: "20. 小说结尾保尔拿到达雅的支持开始创作，这一情节的深刻含义是什么？", a: "答：说明保尔找到了新的人生方向，也表明真正的爱情是精神上的支持与陪伴。保尔的战斗仍在继续。" },
                { q: "21. 结合小说情节，分析保尔从一个顽皮少年成长为钢铁战士的心路历程，并说明这一成长过程中哪些因素起到了关键作用。", a: "答：历程：①少年时期——反抗神父、偷枪，表现出反抗精神；②参加革命——在朱赫来引导下加入红军，英勇战斗；③建设时期——参加筑路，与严寒和疾病斗争；④病残时期——全身瘫痪、双目失明后坚持文学创作。关键因素：朱赫来的引导、革命斗争的锻炼、战友的鼓励、自身的顽强意志。" },
                { q: "22. 保尔与冬妮亚、丽达、达雅三段感情经历分别反映了保尔不同阶段的性格特点和价值观变化，请结合文本进行分析。", a: "答：①与冬妮亚：少年时期的初恋，因阶级观念差异分手，反映保尔逐渐成熟的革命觉悟；②与丽达：革命战友式的爱情，因误会分手，反映保尔将革命事业置于个人感情之上；③与达雅：相互扶持的婚姻，保尔帮助达雅成长，达雅在保尔病残后给予支持，反映保尔成熟的人生观和真正的爱情观。" },
                { q: "23. 小说中的“筑路”情节是全书的经典篇章，请分析这一情节在塑造人物形象、深化主题方面的作用。", a: "答：塑造人物：筑路中保尔面对严寒、饥饿、疾病、匪患仍坚持工作，展现了他钢铁般的意志和革命献身精神。深化主题：筑路象征着革命建设的艰难，保尔和战友们用生命铺就通往胜利的道路，生动诠释了“钢铁是怎样炼成的”这一主题。" },
                { q: "24. 保尔在全身瘫痪、双目失明后仍坚持创作，最终写出《暴风雨里诞生的》。这一情节体现了怎样的人生观？对我们当代青少年有何启示？", a: "答：人生观：生命不息、奋斗不止；人最宝贵的是生命，要为崇高理想而活；身体可以残疾，精神不能倒下。启示：当代青少年应学习保尔顽强拼搏的精神，面对困难不退缩，珍惜生命、追求有意义的人生，为实现个人价值和社会进步而努力。" },
