<!DOCTYPE html>
  <html lang="zh-CN">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布新内容 - 锦水微澜</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root{--green:#2c4b2f;--gold:#b5853a;--paper:#f5f0e8;--ink:#4a3f2f;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--paper);color:var(--ink);padding:20px;max-width:560px;margin:0 auto;}
  header{text-align:center;padding:25px 0 15px;}
  header h1{font-size:1.6rem;color:var(--green);letter-spacing:2px;}
  header p{font-size:13px;color:#8a7a65;margin-top:6px;}
  .card{background:#fff;border-radius:14px;padding:28px;margin-top:10px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid rgba(181,133,58,.15);}
  label{display:block;margin:18px 0 6px;font-size:14px;font-weight:600;color:var(--ink);}
  input,select{width:100%;padding:12px 14px;font-size:15px;border:2px solid #e5ddd0;border-radius:10px;background:#faf8f4;transition:border-color .2s;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  input[type="file"]{padding:10px;background:#fff;cursor:pointer;}
  .hint{font-size:12px;color:#9c8b75;margin-top:4px;}
  button{width:100%;padding:16px;margin-top:28px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:background   
  .2s;}
  button:hover{background:#3d6b42;}
  #status{margin-top:20px;padding:16px;border-radius:10px;text-align:center;display:none;font-size:14px;line-height:1.6;}
  #status.success{background:#e8f5e9;color:var(--green);border:1px solid #c8e6c9;}
  #status.error{background:#fce8e6;color:#c62828;border:1px solid #ffcdd2;}
  #status.loading{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;}
  footer{text-align:center;padding:30px 0;font-size:12px;color:#a59985;}
  </style>
  </head>
  <body>

  <header>
    <h1>锦水微澜 · 内容发布</h1>
    <p>上传 DeepSeek 生成的 HTML 文件，自动更新到网站</p>
  </header>

  <div class="card">
    <label>1. 内容分类</label>
    <select id="folder">
      <option value="mingzhu/">📚 名著导读</option>
      <option value="jiaoxue/">📂 教学资源</option>
      <option value="hanzi/">✍️ 汉字听写</option>
      <option value="shici/">🌸 诗词大会</option>
    </select>

    <label>2. 子文件夹名称</label>
    <input type="text" id="subfolder" placeholder="输入拼音，如 haidiliangwanli">
    <div class="hint">建议用英文或拼音，不要有空格和特殊符号</div>

    <label>3. 页面类型</label>
    <select id="pageType">
      <option value="index.html">📑 书目首页</option>
      <option value="tiankong.html">📝 填空题</option>
      <option value="xuanze.html">🔘 选择题</option>
      <option value="jianda.html">✏️ 简答题</option>
      <option value="jiedu.html">📖 深度解读</option>
      <option value="daan.html">📋 答案详解</option>
    </select>

    <label>4. 选择 HTML 文件</label>
    <input type="file" id="fileInput" accept=".html">

    <label>5. 发布密码</label>
    <input type="password" id="password" placeholder="请输入发布密码">

    <button onclick="upload()">🚀 发布到网站</button>
    <div id="status"></div>
  </div>

  <footer>
    锦水微澜教育工作室 · 黄国荣
  </footer>

  <script>
  const WORKER_URL = 'https://jinshui-upload.afterthatspring.workers.dev/';

  async function upload() {
    const file = document.getElementById('fileInput').files[0];
    const folder = document.getElementById('folder').value;
    const sub = document.getElementById('subfolder').value.trim();
    const type = document.getElementById('pageType').value;
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');

    if (!file) { show('请选择 HTML 文件', 'error'); return; }
    if (!sub) { show('请输入子文件夹名称', 'error'); return; }
    if (!password) { show('请输入发布密码', 'error'); return; }

    const path = folder + sub + '/' + type;

    const form = new FormData();
    form.append('file', file);
    form.append('path', path);
    form.append('message', '更新 ' + sub + ' ' + type);

    show('正在发布，请稍候...', 'loading');

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'X-Upload-Password': password },
        body: form
      });
      const data = await res.json();
      if (data.success) {
        show('✅ ' + data.message + '\\n\\n访问地址：\\n' + path, 'success');
      } else {
        show('❌ 发布失败：' + (data.error || '未知错误'), 'error');
      }
    } catch (e) {
      show('❌ 网络错误：' + e.message, 'error');
    }
  }

  function show(msg, cls) {
    const s = document.getElementById('status');
    s.style.display = 'block';
    s.className = cls;
    s.innerText = msg;
  }
  </script>

  </body>
  </html>
